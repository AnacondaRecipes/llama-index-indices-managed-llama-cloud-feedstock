{% set name = "llama-index-indices-managed-llama-cloud" %}
{% set version = "0.9.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/llama_index_indices_managed_llama_cloud-{{ version }}.tar.gz
  sha256: b5e00752ab30564abf19c57595a2107f5697c3b03b085817b4fca84a38ebbd59

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - deprecated ==1.2.18
    # upstream pins ==0.1.35 but relaxed to avoid conflict with llama-cloud-services ==0.1.46
    - llama-cloud >=0.1.35
    - llama-index-core >=0.13.0,<0.15
    - llamaindex-py-client >=0.1.19,<0.2.0

test:
  imports:
    - llama_index.indices.managed.llama_cloud
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/indices/llama-index-indices-managed-llama-cloud
  summary: llama-index indices llama-cloud integration
  description: |
    LlamaIndex integration for managed indices on LlamaCloud. Provides
    cloud-based index management capabilities for LlamaIndex applications.
  license: MIT
  license_file: LICENSE
  license_family: MIT
  doc_url: https://docs.llamaindex.ai/en/stable/
  dev_url: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/indices/llama-index-indices-managed-llama-cloud

extra:
  recipe-maintainers:
    - pavelzw
    - jan-janssen
